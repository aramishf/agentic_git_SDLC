name: Test AI SDLC Action

on:
  issues:
    types: [opened, edited]

jobs:
  test-ai-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run local AI SDLC Agent action
        uses: ./
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          test_command: 'pytest'
