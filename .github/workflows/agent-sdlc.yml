name: Agentic Git SDLC

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SDLC Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python target_repo/agent.py

      - name: Create Pull Request with Bug Fix
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: automatically resolved issue #${{ github.event.issue.number }}"
          title: "Agent Fix: ${{ github.event.issue.title }}"
          body: |
            This PR was automatically generated by the Git SDLC Agentic AI.
            Closes #${{ github.event.issue.number }}
          branch: "agent-fix-${{ github.event.issue.number }}"
          delete-branch: true
